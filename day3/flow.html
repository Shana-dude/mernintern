<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="bg-white lg:bg-blue-500 block max-w-sm border border-gray-300 rounded-xl shadow-md mx-auto">
    
    <a href="#">

        <!-- 📱 MOBILE IMAGE -->
        <img 
            class="rounded-t-xl block md:hidden"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9Yr7d-ZAHyH6fsShaPeXexRKDpedIOO97Eg&s"
            alt="Mobile Image"
        />

        <!-- 🖥 DESKTOP IMAGE -->
        <img 
            class="rounded-t-xl hidden md:block"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9Yr7d-ZAHyH6fsShaPeXexRKDpedIOO97Eg&s"
            alt="Desktop Image"
        />

    </a>

    <div class="p-6 text-center">

        <span class="inline-flex items-center bg-purple-100 border border-purple-300 text-purple-700 text-xs font-medium px-1.5 py-0.5 rounded-sm">
            Trending
        </span>

        <a href="#">
            <h5 class="mt-3 mb-6 text-2xl font-semibold tracking-tight text-gray-900">
                Streamlining your design process today.
            </h5>
        </a>

        <a href="#" class="inline-flex items-center text-white bg-purple-600 box-border border border-transparent hover:bg-purple-700 focus:ring-4 focus:ring-purple-300 shadow-md font-medium leading-5 rounded-lg text-sm px-4 py-2.5 focus:outline-none">
            Read more
            <svg class="w-4 h-4 ml-1.5 rtl:rotate-180 -mr-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M19 12H5m14 0-4 4m4-4-4-4"/>
            </svg>
        </a>

    </div>

</div>

</body>
</html>
